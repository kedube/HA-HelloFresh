name: Feature request
description: Suggest an improvement for the HelloFresh integration.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Clear use cases help a lot.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: The integration could ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I also considered ...
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, examples, or links are welcome.
